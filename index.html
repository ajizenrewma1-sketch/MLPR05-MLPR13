        // --- Core Functions ---
        function switchTab(tab) {

        function handleFileUpload(fileKey, input) {
            const file = input.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.csv')) {
                showError(`ไฟล์ ${fileKey} ต้องเป็นนามสกุล .csv เท่านั้น`);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const content = e.target.result;
                    const parsed = parseCSV(content);
                    filesData[fileKey] = { name: file.name, data: parsed };
                    renderUploadCards();
		// --- เพิ่มบรรทัดนี้ลงไปครับ ---
            	    updateSummaryButtonState(); 
            	// --------------------------
                    hideError();
                } catch (err) {
                    showError(`เกิดข้อผิดพลาดในการอ่านไฟล์ ${fileKey}`);
                }
            };
            reader.readAsText(file);
        }

async function handleMultipleFiles(key, input) {
    const files = Array.from(input.files);
    if (files.length === 0) return;

    try {
        Swal.fire({
            title: 'กำลังรวมและแปลงข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        let combinedData = [];
        
        // วนลูปอ่านทุกไฟล์ที่อัปโหลดเข้ามา
        for (const file of files) {
            const content = await file.text();
            const parsed = parseCSV(content); // ใช้ฟังก์ชัน Parse เดิมของระบบ
            
            // --- ⚙️ ขั้นตอน Transform (ปรับแต่งข้อมูล) ---
            const transformed = parsed.map(row => ({
                ...row,
                _source_filename: file.name // เพิ่มชื่อไฟล์ต้นฉบับเข้าไปในข้อมูลแต่ละแถว (ตัวอย่างการ Transform)
            }));
            
            // --- ⚙️ ขั้นตอน Combine (รวมข้อมูล) ---
            combinedData = combinedData.concat(transformed);
        }

        // เก็บข้อมูลที่รวมแล้วลงใน filesData
        filesData[key] = {
            name: key,
            data: combinedData,
            fileCount: files.length
        };

        // อัปเดต UI และปุ่มสรุปผล
        renderUploadCards();
        if (typeof updateSummaryButtonState === 'function') updateSummaryButtonState();

        Swal.fire({
            icon: 'success',
            title: 'รวมข้อมูลสำเร็จ',
            text: `รวมไฟล์ ${key} ทั้งหมด ${files.length} ไฟล์ เรียบร้อยแล้ว`,
            timer: 2000
        });

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line !== '');
            if (lines.length === 0) return [];
            
            const rawHeaders = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').replace(/^\ufeff/, ''));
            
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim().replace(/^"|"$/g, ''));
                
                const obj = {};
                obj.__rawValues = values;
                
                rawHeaders.forEach((header, i) => {
                    obj[header] = values[i] || "";
                });
                return obj;
            });
        }

        function classifyVehicle(row) {
            const possibleKeys = Object.keys(row).filter(k => k.includes('ประเภท'));
            for (let key of possibleKeys) {
                const val = String(row[key]).toUpperCase().replace(/\s/g, '');
                if (val.includes('C1') || val.includes('4ล้อ')) return 'C1';
                if (val.includes('C2') || val.includes('6ล้อ')) return 'C2';
                if (val.includes('C3') || val.includes('มากกว่า6')) return 'C3';
            }
            return 'C4';
        }

        if (plazaKey && stats.main[plazaKey]) {

        function getR06Summary() {
            if (!filesData.R06) return null;
            const data = filesData.R06.data;
            const initialRow = () => ({ items: 0, amount: 0, C1: 0, C2: 0, C3: 0, C4: 0, exItems: 0, exC1: 0, exC2: 0, exC3: 0, exC4: 0 });
            const stats = {
                grandTotal: 0, normalTotal: 0, exemptTotal: 0,
                main: { nonMember: initialRow(), memberGroup: initialRow(), memberThai: initialRow(), memberForeign: initialRow(), memberJuridical: initialRow(), total: initialRow() },
                sla: { total: 0, lessThan8: 0, moreThan8: 0, avgTime: 0 }
            };

                const headers = Object.keys(item).filter(k => k !== '__rawValues');
                const isExempt = String(item[headers.find(k => k.includes('รถยกเว้น'))] || '').trim() !== '-';
                const userType = String(item[headers.find(k => k.includes('ประเภทผู้ใช้บริการ'))] || '').trim();
                const fee = parseFloat(String(item[headers.find(k => k.includes('ค่าธรรมเนียม'))] || '0').replace(/[^0-9.]/g, '')) || 0;
                const sla = String(item[headers.find(k => k.includes('ผล SLA'))] || '').trim().toUpperCase();
                const timeStr = String(item[headers.find(k => k.includes('T2-T1'))] || '0:0');
                
                let mKey = userType.includes('ไทย') ? 'memberThai' : userType.includes('ต่างชาติ') ? 'memberForeign' : userType.includes('นิติบุคคล') ? 'memberJuridical' : 'nonMember';
                const cKey = classifyVehicle(item);

                if (!isExempt) {
                    stats.normalTotal++;
                    [mKey, 'total'].forEach(k => { stats.main[k].items++; stats.main[k].amount += fee; stats.main[k][cKey]++; });
                } else {
                    stats.exemptTotal++;
                    [mKey, 'total'].forEach(k => { stats.main[k].exItems++; stats.main[k][`ex${cKey}`]++; });
                }
                stats.grandTotal++;
                stats.sla.total++;
                if (sla === 'P') stats.sla.lessThan8++; else if (sla === 'F') stats.sla.moreThan8++;
                const t = timeStr.split(':');
                if (t.length === 2) totalSlaTimeSec += (parseInt(t[0]) * 60) + parseInt(t[1]);
            });
            ['memberThai', 'memberForeign', 'memberJuridical'].forEach(k => {
                Object.keys(stats.main[k]).forEach(prop => stats.main.memberGroup[prop] += stats.main[k][prop]);
            });
            if (stats.sla.total > 0) stats.sla.avgTime = (totalSlaTimeSec / 60) / stats.sla.total;
            return stats;
        }

            const rMatch = desc.match(/^R(\d+)/);

                    else stats.R6_FORBID++;

                else if (rCode === 'R8') stats.R8++;

            }
        }

        // --- 2. ฟังก์ชันหลักสำหรับปุ่ม 1.1 - 1.4 (ชนด้วย Transaction No) ---
        function compareTransactions(dataA, dataB, labelA, labelB) {
            const getTransList = (data) => {
                const key = Object.keys(data[0] || {}).find(k => k.toLowerCase().includes('transaction no'));
                return data.map(row => String(row[key] || '').trim()).filter(v => v !== '');
            };
            const listA = getTransList(dataA);
            const listB = getTransList(dataB);
            const setA = new Set(listA);
            const setB = new Set(listB);
            return {
                aInB: listA.filter(id => setB.has(id)),
                aNotInB: listA.filter(id => !setB.has(id)),
                bInA: listB.filter(id => setA.has(id)),
                bNotInA: listB.filter(id => !setA.has(id)),
                countA: listA.length, countB: listB.length
            };
        }

        // --- 3. ฟังก์ชันสำหรับปุ่ม 1.5 (หารายการซ้ำ) ---
        function findR05Duplicates() {
    // 1. เช็คว่ามีข้อมูล R05 ไหม
    if (!filesData || !filesData.R05) {
        Swal.fire({ icon: 'warning', title: 'ไม่พบข้อมูล R05', text: 'กรุณาอัพโหลดไฟล์ก่อน' });
        return;
    }

    const data = filesData.R05.data;
    const map = new Map();
    const duplicates = [];

    // หัวข้อที่ใช้เช็คซ้ำตามที่คุณต้องการ
    const targetCols = [
        'ทะเบียนรถ', 
        'ทะเบียนจังหวัด', 
        'วันที่ขาเข้า', 
        'เวลาขาเข้า', 
        'ด่านขาเข้า'
    ];

    data.forEach((row, index) => {
        // สร้างประโยคสำหรับเช็คซ้ำ (รวม 5 คอลัมน์)
        const combinedKey = targetCols
            .map(col => String(row[col] || '').trim())
            .join(' '); // ใช้ช่องว่างคั่นตามที่คุณต้องการ
        
        // ดึง Transaction No. (ตรวจสอบชื่อคอลัมน์ให้ตรงกับ CSV)
        const transNo = row['Transaction No.'] || row['Transaction No'] || 'ไม่พบเลข';

        if (combinedKey.trim() !== "") {
            if (map.has(combinedKey)) {
                const firstMatch = map.get(combinedKey);
                
                // ถ้าซ้ำครั้งแรก เก็บตัวต้นฉบับก่อน
                if (!firstMatch.isAdded) {
                    duplicates.push({ 
                        line: firstMatch.line, 
                        transNo: firstMatch.transNo,
                        content: combinedKey 
                    });
                    firstMatch.isAdded = true;
                }
                
                // เก็บตัวที่ซ้ำปัจจุบัน
                duplicates.push({ 
                    line: index + 2, 
                    transNo: transNo,
                    content: combinedKey 
                });
            } else {
                // บันทึกตัวแรกที่เจอ
                map.set(combinedKey, { 
                    line: index + 2, 
                    transNo: transNo, 
                    isAdded: false 
                });
            }
        }
    });

    // 2. ส่วนการแสดงผล (ถ้าไม่ใส่ส่วนนี้ หน้าจอจะนิ่งและช่องอัพโหลดอาจค้าง)
    // ... (โค้ดส่วนประมวลผล Map เดิมของคุณ) ...

    if (duplicates.length > 0) {
        let listHtml = `<div class="text-left space-y-3 max-h-[500px] overflow-y-auto p-2 font-sarabun">`;
        
        // ตัวแปรสำหรับสลับสีกลุ่ม
        let groupIndex = 0;
        
        duplicates.forEach((item, i) => {
            // เช็คว่าเป็นกลุ่มใหม่หรือไม่ (ถ้าประโยคเช็คไม่เหมือนกับรายการก่อนหน้า แปลว่าเป็นกลุ่มซ้ำชุดใหม่)
            const isNewGroup = i > 0 && item.content !== duplicates[i-1].content;
            
            if (isNewGroup) groupIndex++;

            // กำหนดสีพื้นหลังสลับกันตามกลุ่ม (กลุ่มที่ 1 สีขาว, กลุ่มที่ 2 สีฟ้าอ่อน เป็นต้น)
            const bgColors = ['bg-white', 'bg-blue-50', 'bg-emerald-50', 'bg-amber-50', 'bg-purple-50'];
            const bgColor = bgColors[groupIndex % bgColors.length];
            const borderColor = isNewGroup ? 'border-t-4 border-t-red-500 mt-6' : 'border-gray-200';

            listHtml += `
                <div class="p-4 border-x border-b rounded-xl ${bgColor} ${borderColor} shadow-sm transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <span class="bg-slate-700 text-white text-[10px] px-2 py-1 rounded font-bold">กลุ่มที่ ${groupIndex + 1}</span>
                            <span class="bg-red-500 text-white text-[10px] px-2 py-1 rounded font-bold">แถวที่ ${item.line}</span>
                        </div>
                        <span class="font-mono text-sm font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded">
                            ID: ${item.transNo}
                        </span>
                    </div>
                    <div class="text-[12px] text-gray-600 font-medium p-2 bg-white/50 rounded border border-dashed border-gray-300">
                        <span class="text-gray-400 text-[10px] block mb-1">ข้อมูลที่ซ้ำกัน:</span>
                        ${item.content}
                    </div>
                </div>`;
        });
        listHtml += `</div>`;

        Swal.fire({
            title: `<div class="flex items-center justify-center gap-2">
                        <span class="text-red-600 font-bold">พบรายการซ้ำทั้งหมด ${duplicates.length} รายการ</span>
                    </div>`,
            html: listHtml,
            width: '600px',
            confirmButtonText: 'รับทราบ',
            confirmButtonColor: '#1e293b',
            customClass: { popup: 'rounded-3xl' }
        });
    } 
else {
        Swal.fire({
            icon: 'success',
            title: 'ไม่พบรายการซ้ำ',
            timer: 2000,
            showConfirmButton: false,
            customClass: { popup: 'rounded-2xl' }

        function runReconcile(type) {
            const { valid, invalid } = getR05SplitData();
            let result, title, labelA, labelB;

            try {
                if (type === '05vs06') {
                    if (!filesData.R05 || !filesData.R06) throw "กรุณาอัปโหลดไฟล์ R05 และ R06 ก่อน";
                    result = compareTransactions(valid, filesData.R06.data, 'R05 ตรวจสอบได้', 'R06');
                    title = "ผลการชนข้อมูล 1.1 (R05 ตรวจสอบได้ vs R06)";
                    labelA = "R05 ตรวจสอบได้"; labelB = "R06";
                } else if (type === '05vs07') {
                    if (!filesData.R05 || !filesData.R07) throw "กรุณาอัปโหลดไฟล์ R05 และ R07 ก่อน";
                    result = compareTransactions(invalid, filesData.R07.data, 'R05 ตรวจสอบไม่ได้', 'R07');
                    title = "ผลการชนข้อมูล 1.2 (R05 ตรวจสอบไม่ได้ vs R07)";
                    labelA = "R05 ตรวจสอบไม่ได้"; labelB = "R07";
                } else if (type === '05vs08') {
                    if (!filesData.R05 || !filesData.R08) throw "กรุณาอัปโหลดไฟล์ R05 และ R08 ก่อน";
                    result = compareTransactions(valid, filesData.R08.data, 'R05 ตรวจสอบได้', 'R08');
                    title = "ผลการชนข้อมูล 1.3 (R05 ตรวจสอบได้ vs R08)";
                    labelA = "R05 ตรวจสอบได้"; labelB = "R08";
                } else if (type === '06vs08') {
                    if (!filesData.R06 || !filesData.R08) throw "กรุณาอัปโหลดไฟล์ R06 และ R08 ก่อน";
                    result = compareTransactions(filesData.R06.data, filesData.R08.data, 'R06', 'R08');
                    title = "ผลการชนข้อมูล 1.4 (R06 vs R08)";
                    labelA = "R06"; labelB = "R08";
                } else if (type === 'dup') {
                    if (!filesData.R05) throw "กรุณาอัปโหลดไฟล์ R05 ก่อน";
                    const dups = findR05Duplicates();
                    showDuplicatePopup(dups);
                    return;
                }
                showResultPopup(title, result, labelA, labelB);
            } catch (err) { alert(err); }
        }

        function getValidationClass(field, manualVal, autoData) {
    // 1. ถ้ายังไม่กรอกข้อมูล (ค่าว่าง) ให้เป็นสีพื้นปกติ (ไม่เขียวไม่แดง)
    if (manualVal === undefined || manualVal === null || manualVal === '') {
        return 'bg-white'; 
    }

    let compareVal;
    // 2. แยก Logic ระหว่างช่องปกติกับ Grand Total
    if (field === 'grandTotal') {
        // สำหรับ Grand Total เราส่งตัวเลขยอดรวมมาโดยตรง (autoTotal)
        compareVal = autoData;
    } else {
        // สำหรับเลนปกติ ดึงค่าจาก Object sysData
        compareVal = (autoData && autoData[field]) ? autoData[field] : 0;
    }

    // 3. เปรียบเทียบโดยแปลงเป็นตัวเลขทั้งคู่ (กัน Error จาก String)
    const v1 = Number(manualVal);
    const v2 = Number(compareVal);

    if (v1 === v2) {
        return 'bg-emerald-100 text-emerald-700 font-bold'; // กรอกถูก = เขียว
    } else {
        return 'bg-red-100 text-red-700 animate-pulse font-bold'; // กรอกผิด = แดงนิกะ
    }
}

        // --- Data Update with Clean Spaces Rule ---
        function updateVal(type, path, val) {
    // 1. ลบลูกน้ำและช่องว่างออก
    const cleanVal = val.replace(/[,\s]/g, '');
    
    let target;
    if (type === 'r05') target = manualData;
    else if (type === 'r06') target = manualR06Data;
    else if (type === 'r07') target = manualR07Data;
    else if (type === 'r08') target = manualR08Data;
    else if (type === 'r09') target = manualR09Data; // บันทึกเข้าตัวแปร R09
    else if (type === 'r11') target = manualR11Data; 
    else if (type === 'r13') target = manualR13Data; 

    if (!target) return; 

    // 2. เจาะเข้าไปบันทึกค่าตาม path
    const keys = path.split('.');
    for (let i = 0; i < keys.length - 1; i++) {
        target = target[keys[i]];
    }
    target[keys[keys.length - 1]] = cleanVal;

    // 🚩 ส่วนที่แก้ไข: ลบการสั่ง renderR09 ออกจากตรงนี้
    // ระบบจะแค่บันทึกค่าลงตัวแปร manualR09Data เงียบๆ 
    // และจะรอจนกว่าคุณจะกดปุ่ม "ประมวลผล R09" ถึงจะเกิดการวาดตารางใหม่
    
    console.log(`Updated ${type} [${path}]: ${cleanVal}`); 
}

function processSingleReport(type) {
    console.log(`Processing ${type}...`);

    // ค้นหาส่วน r05
if (type === 'r05') {
    const r05Sys = getR05Summary();
    /* 🚩 ลบก้อนที่เขียนทับข้อมูล manualData ออกให้หมด 
       เช่น manualData.grandTotal = r05Sys.grandTotal; 
       หรือ manualData.checked = ... 
    */
    renderR05('r05-auto', r05Sys, false);
    renderR05('r05-manual', manualData, true, r05Sys); // ใช้ค่าจาก manualData เดิมมาเทียบ
}
	// ค้นหาตำแหน่งเดิมที่คุณยกมา แล้วเปลี่ยนเป็นแบบนี้ครับ:
else if (type === 'r06') {
    const r06Sys = getR06Summary();
    // 🚩 ลบก้อน if (r06Sys) { ... } ที่สั่ง Copy ข้อมูลทิ้งให้หมด
    
    // สั่งวาดตารางเลย โดยใช้ค่าเดิมที่มีอยู่ใน manualR06Data (ที่กรอกไว้)
    renderR06('r06-auto', r06Sys, false);
    renderR06('r06-manual', manualR06Data, true, r06Sys);

    // 🚩 ค้นหาจุดนี้ในไฟล์ของคุณ:
else if (type === 'r07') {

    // 👇 ลบหรือคอมเมนต์ 2 บรรทัดนี้ออก (นี่คือตัวการที่ทำให้ค่า Auto มาทับ Manual)
    // if (r07Sys) {
    //     manualR07Data = JSON.parse(JSON.stringify(r07Sys));

    // เหลือไว้แค่ 2 บรรทัดข้างล่างนี้ เพื่อสั่งให้วาดตารางใหม่เฉยๆ
    renderR07('r07-auto', r07Sys, false);

    else if (type === 'r08') {

    renderR08('r08-auto', r08Sys, false);
    renderR08('r08-manual', manualR08Data, true, r08Sys);
}
else if (type === 'r09') {
    // 🚩 เรียกฟังก์ชันที่ดึงข้อมูลจากช่อง R09 (ที่เราแก้ไปก่อนหน้านี้)
    const r09SysData = getR09Summary(); 
    
    // 🚩 เปลี่ยนเงื่อนไขการเช็ค: จากเดิมที่เช็ค !r05Sys ให้เช็ค r09SysData แทน
    if (!r09SysData) {
        if (typeof Swal !== 'undefined') {
            Swal.fire({
                icon: 'error',
                title: 'ไม่พบข้อมูล',
                text: 'กรุณาอัปโหลดไฟล์ในช่อง "รายงาน R09" เพื่อใช้คำนวณยอด',
                confirmButtonColor: '#ef4444',

            });
        } else {
            alert('กรุณาอัปโหลดไฟล์ในช่อง "รายงาน R09" เพื่อใช้คำนวณยอด');
        }
        return;
    }

    // สั่งวาดตารางโดยใช้ข้อมูลจากช่อง R09
    renderR09('r09-auto', r09SysData, false);
    renderR09('r09-manual', manualR09Data, true, r09SysData);
}
    else if (type === 'r13') {
        const r13Sys = getR13Summary();
        if (r13Sys) {
            manualR13Data.grandTotal = r13Sys.grandTotal;
            manualR13Data.rows = JSON.parse(JSON.stringify(r13Sys.rows));
        }
        renderR13('r13-auto', r13Sys, false);
        renderR13('r13-manual', manualR13Data, true, r13Sys);
    }
    
    if (typeof Swal !== 'undefined') {
        Swal.fire({
            icon: 'success',
            title: 'สำเร็จ',
            text: `ประมวลผลข้อมูล ${type.toUpperCase()} เรียบร้อยแล้ว`,
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true,
            customClass: { popup: 'rounded-2xl' }
        });
    } else {
        alert(`ประมวลผลข้อมูล ${type.toUpperCase()} เรียบร้อยแล้ว`);
    }
}
        function showError(msg) {
            document.getElementById('error-container').classList.remove('hidden');
            document.getElementById('error-text').innerText = msg;
        }

        function hideError() {
            document.getElementById('error-container').classList.add('hidden');
        }

        // --- Smart Paste Event Listener ---
        // รองรับการวางข้อมูล (Paste) ข้ามช่องที่ว่างเปล่า และลบการเว้นวรรค
        document.addEventListener('paste', function(e) {
            const target = e.target;
            if (target.tagName.toLowerCase() !== 'input' || target.type !== 'text') return;

            e.preventDefault();

            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const rows = pastedText.split(/\r?\n/);
            const flatValues = [];
            
            rows.forEach(row => {
                const cells = row.split('\t');
                cells.forEach(cell => {
                    // ลบช่องว่างออกทั้งหมดสำหรับทุกๆ ค่าที่ถูกก็อปมา
                    const cleanCell = cell.replace(/\s+/g, '');
                    // เก็บเฉพาะค่าที่ไม่ใช่ความว่างเปล่า เพื่อไม่ให้ไปดันข้อมูลช่องอื่น
                    if (cleanCell !== '') {
                        flatValues.push(cleanCell);
                    }
                });
            });

            if (flatValues.length === 0) return;

            // ดึง Input ทั้งหมดในตารางที่แสดงผลอยู่
            const allInputs = Array.from(document.querySelectorAll('#view-pivot input[type="text"]'));
            const startIndex = allInputs.indexOf(target);

            if (startIndex === -1) return;

            let inputIndex = startIndex;
            for (let i = 0; i < flatValues.length; i++) {
                if (inputIndex >= allInputs.length) break;

                const val = flatValues[i];
                const inputElement = allInputs[inputIndex];
                inputElement.value = val;
                // สร้าง Event เพื่ออัปเดตค่าไปยังตัวแปร ManualData อัตโนมัติ
                inputElement.dispatchEvent(new Event('change', { bubbles: true }));
                
                inputIndex++;
            }
        });

        // ... (โค้ดส่วน window.onload เดิม) ...
        window.onload = () => { renderUploadCards(); };

// --- ส่วนที่ 1: ตัวแปรส่วนกลางสำหรับเก็บข้อมูลล่าสุด ---
let drillDownData = { r05: {}, tcvs: {} };
let lastReconcileResult = null; // เพิ่มตัวแปรเก็บผลลัพธ์ล่าสุดเพื่อใช้เรียกกลับมา

// ฟังก์ชันช่วยเหลือ: แปลงวันที่
function formatTcvsDateForTank(dateStr) {
    if (!dateStr) return "";
    const p = String(dateStr).trim().split(/[-/]/);
    if (p.length === 3 && p[0].length === 4) {
        return `${p[2].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[0]}`;
    }
    return dateStr;
}

// --- ส่วนที่ 2: ฟังก์ชันหลักสำหรับการชนข้อมูล ---
function reconcileR05vsTcvs() {
    if (!filesData['R05'] || !filesData['Tcvs'] || !filesData['TankReport']) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณาอัปโหลด R05, Tcvs และ รวมถังให้ครบก่อน', 'warning');
        return;
    }

    drillDownData = { r05: {}, tcvs: {} };
    const r05Raw = filesData['R05'].data;
    const tcvsRaw = filesData['Tcvs'].data;
    const tankRaw = filesData['TankReport'].data;

    const totalR05 = r05Raw.length;
    const totalTcvs = tcvsRaw.length;
    const diffTotal = Math.abs(totalR05 - totalTcvs);

    const r05CleanSet = new Set(r05Raw.map(r => {
        const val = String(r['Transaction No.'] || "").trim();
        return val.substring(0, 30).slice(-8);
    }));

    const tankStatusMap = new Map();
    tankRaw.forEach(row => {
        const dt = String(row['ช่วงเวลาผ่านทาง'] || "").trim();
        const status = String(row['สถานะ'] || "").trim();
        if (dt && status !== "ใช้งาน" && !tankStatusMap.has(dt)) {
            tankStatusMap.set(dt, status);
        }
    });

    let r05Found = 0, r05NotFound = 0;
    const tcvsSet = new Set(tcvsRaw.map(r => String(r['Transaction No.'] || "").trim()));

    r05Raw.forEach(row => {
        const fullTx = String(row['Transaction No.'] || "").trim();
        const clean8 = fullTx.substring(0, 30).slice(-8);
        if (tcvsSet.has(clean8)) {
            r05Found++;
        } else {
            r05NotFound++;
            let key = fullTx;
            if (fullTx.startsWith('MT')) key = fullTx.substring(0, 3);
            else if (fullTx.startsWith('TW')) key = fullTx.substring(0, 2);
            if (!drillDownData.r05[key]) drillDownData.r05[key] = [];
            drillDownData.r05[key].push(fullTx);
        }
    });

    let tcvsFound = 0, tcvsNotFound = 0;
    tcvsRaw.forEach(row => {
        const tcvsTx = String(row['Transaction No.'] || "").trim();
        if (r05CleanSet.has(tcvsTx)) {
            tcvsFound++;
        } else {
            tcvsNotFound++;
            const dateParts = String(row['Date'] || "").split(/[-/]/);
            const formattedDate = dateParts.length === 3 && dateParts[0].length === 4 ? `${dateParts[2].padStart(2,'0')}/${dateParts[1].padStart(2,'0')}/${dateParts[0]}` : row['Date'];
            const searchDT = `${formattedDate} ${String(row['Time'] || "").trim()}`;
            const status = tankStatusMap.get(searchDT) || "ไม่พบสถานะ";
            if (!drillDownData.tcvs[status]) drillDownData.tcvs[status] = [];
            drillDownData.tcvs[status].push({ tx: tcvsTx, dt: searchDT });
        }
    });

    // เก็บผลลัพธ์ลงตัวแปร Global
    lastReconcileResult = {
        totalR05, totalTcvs, diffTotal,
        r05Found, r05NotFound,
        tcvsFound, tcvsNotFound,
        diffNotFound: Math.abs(r05NotFound - tcvsNotFound)
    };

    renderFinalPopup(lastReconcileResult);
}

// --- ส่วนที่ 4: ฟังก์ชันแสดงป๊อปอัพรายละเอียดชั้นที่ 2 ---

    if (type === 'r05') {
        contentHtml = `
            <div class="grid grid-cols-2 gap-2 text-sm">
                ${list.map(tx => `<div class="bg-indigo-50 p-2 rounded-lg border border-indigo-100 font-mono text-center font-bold text-indigo-700">${tx}</div>`).join('')}
            </div>
        `;
    } else {
        contentHtml = `
            <div class="overflow-hidden rounded-2xl border border-slate-200">
                <table class="w-full text-xs text-left">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="p-3">Transaction No.</th>
                            <th class="p-3">ช่วงเวลาผ่านทาง</th>
