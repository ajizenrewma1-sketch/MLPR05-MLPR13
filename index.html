    <style>
/* 1. เพิ่ม Animation หัวใจเต้น (Drums of Liberation) */
@keyframes nika-heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5)); }
}

/* 2. สไตล์ Card สำหรับปุ่มชนข้อมูล */
.nika-reconcile-card {
    background: #ffffff;
    border-radius: 2rem;
    border: 2px solid #f1f5f9;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* เอฟเฟกต์เด้งแบบยาง */
}

.nika-reconcile-card:hover {
    transform: translateY(-5px) scale(1.02);
    border-color: #a855f7; /* สีม่วงเกียร์ 5 */
    box-shadow: 0 20px 25px -5px rgba(168, 85, 247, 0.1);
}

/* 3. ปุ่มที่กำลังประมวลผลให้ใส่คลาสนี้ */
.drum-active {
    animation: nika-heartbeat 0.8s infinite;
}

        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700;800&display=swap');
        
        :root {
            --nika-purple: #a855f7;
            --nika-gold: #fbbf24;
            --nika-success: #10b981;
            --nika-error: #f43f5e;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background: radial-gradient(circle at top, #ffffff 0%, #f1f5f9 100%);
            min-height: 100vh;
        }

        /* ☁️ Cloud Card Effect พื้นฐาน */
        .nika-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #ffffff;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.08);
            border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nika-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(168, 85, 247, 0.15); }


        /* =========================================================
           👇 1. วาง CSS สำหรับสีตาราง (เขียว/แดง) ตรงนี้ครับ 👇
           ========================================================= */

        /* ปรับ nika-card เมื่ออยู่บนแท็กตาราง (tr) ไม่ให้มีสีพื้นหลังขาวทับ */
        tr.nika-card {
            background: transparent !important; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); /* คงเงาบางๆ ไว้ */
        }

        /* สีเมื่อข้อมูลตรงกัน (เขียว) */
        .row-match { 
            background-color: #dcfce7 !important; 
            color: #166534 !important; 
        }

        /* สีเมื่อข้อมูลคลาดเคลื่อน (แดง) */
        .row-mismatch { 
            background-color: #fee2e2 !important; 
            color: #991b1b !important; 
            font-weight: bold; 
        }

        /* เพิ่มระยะห่างระหว่างแถว */
        .nika-table-row {
            border-bottom: 8px solid transparent; 
            background-clip: padding-box;
        }

        /* ========================================================= */


        /* ⚡ Tab Active Style */
        .tab-active { 
            background: var(--nika-purple) !important; 
            color: white !important; 
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3) !important;
        }

        /* 🥁 Heartbeat Animation */
        @keyframes drums-of-liberation {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(168,85,247,0.4)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(168,85,247,0.7)); }
        }
        .heartbeat-nika { animation: drums-of-liberation 0.8s infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
/* ☁️ Nika Style: Cloud & Rubber Effects */
.nika-upload-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    border: 3px solid #ffffff;
    border-radius: 2.5rem;
    box-shadow: 0 15px 35px rgba(168, 85, 247, 0.1);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
}

.nika-upload-card:hover {
    transform: scale(1.02) translateY(-5px);
    box-shadow: 0 20px 45px rgba(168, 85, 247, 0.2);
    border-color: var(--nika-purple);
}

/* ⚡️ Rubber Input Effect */
.nika-file-input::-webkit-file-upload-button {
    background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 1.5rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
}

.nika-file-input::-webkit-file-upload-button:hover {
    letter-spacing: 1px;
    transform: scale(1.05);
}

/* 🥁 Drums of Liberation Animation */
.drum-hit {
    animation: drums-of-liberation 0.6s infinite;
}
    </style>

    <script>
        // --- App State ---
        let filesData = {};
        const REQUIRED_FILES = ['Tcvs', 'TankReport', 'R05', 'R06', 'R07', 'R08', 'R09', 'R11', 'R13'];
        
        // R05 State
        let manualData = {

const r07Keys = [

];
let manualR07Data = { grandTotal: '' };
r07Keys.forEach(k => manualR07Data[k.id] = '');

        // R08 State
        const createInitialR08Row = () => ({ count: '', amount: '' });
        let manualR08Data = {

            masterData: createInitialR08Row(),
            periodBook: createInitialR08Row(),
            staffApproved: createInitialR08Row()
        };

        // R09 State
        const r09LanesList = [
            "ด่านทับช้าง 1 Lane 1", "ด่านทับช้าง 1 Lane 2", "ด่านทับช้าง 1 Lane 3",

        ];
        let manualR09Data = {};
        r09LanesList.forEach(lane => manualR09Data[lane] = '');

	// --- R11 State ---
        const initR11SubRow = () => ({

        function handleFileUpload(fileKey, input) {
            const file = input.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.csv')) {
                showError(`ไฟล์ ${fileKey} ต้องเป็นนามสกุล .csv เท่านั้น`);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let content = e.target.result;
                    
                    // 🌟 🌟 เพิ่มส่วนนี้: แอบแก้ปัญหาการเคาะบรรทัดใหม่ เฉพาะไฟล์ R11 🌟 🌟
                    if (fileKey === 'R11') {
                        // เปลี่ยน "ยอดรวม (Enter) (บาท)" ให้กลายเป็นบรรทัดเดียวกัน
                        content = content.replace(/"ยอดรวม \r?\n\(บาท\)"/g, '"ยอดรวม (บาท)"');
                    }
                    
                    // ใช้ parseCSV ตัวเดิมของระบบได้อย่างปลอดภัย ไม่กระทบใคร
                    const parsed = parseCSV(content);
                    filesData[fileKey] = { name: file.name, data: parsed };
                    renderUploadCards();
            	    updateSummaryButtonState(); 
                    hideError();
                } catch (err) {
                    showError(`เกิดข้อผิดพลาดในการอ่านไฟล์ ${fileKey}`);
                }
            };
            reader.readAsText(file);
        }

async function handleMultipleFiles(key, input) {
    const files = Array.from(input.files);
    if (files.length === 0) return;

    try {
        Swal.fire({
            title: 'กำลังรวมและแปลงข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        let combinedData = [];
        
        // วนลูปอ่านทุกไฟล์ที่อัปโหลดเข้ามา
        for (const file of files) {
            const content = await file.text();
            const parsed = parseCSV(content); // ใช้ฟังก์ชัน Parse เดิมของระบบ
            
            // --- ⚙️ ขั้นตอน Transform (ปรับแต่งข้อมูล) ---
            const transformed = parsed.map(row => ({
                ...row,
                _source_filename: file.name // เพิ่มชื่อไฟล์ต้นฉบับเข้าไปในข้อมูลแต่ละแถว (ตัวอย่างการ Transform)
            }));
            
            // --- ⚙️ ขั้นตอน Combine (รวมข้อมูล) ---
            combinedData = combinedData.concat(transformed);
        }

        // เก็บข้อมูลที่รวมแล้วลงใน filesData
        filesData[key] = {
            name: key,
            data: combinedData,
            fileCount: files.length
        };

        // อัปเดต UI และปุ่มสรุปผล
        renderUploadCards();
        if (typeof updateSummaryButtonState === 'function') updateSummaryButtonState();

        Swal.fire({
            icon: 'success',
            title: 'รวมข้อมูลสำเร็จ',
            text: `รวมไฟล์ ${key} ทั้งหมด ${files.length} ไฟล์ เรียบร้อยแล้ว`,
            timer: 2000
        });

    } catch (error) {
        console.error(error);
        Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถประมวลผลไฟล์ได้', 'error');
    }
}

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line !== '');
            if (lines.length === 0) return [];
            
            const rawHeaders = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').replace(/^\ufeff/, ''));
            
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim().replace(/^"|"$/g, ''));
                
                const obj = {};
                obj.__rawValues = values;
                
                rawHeaders.forEach((header, i) => {
                    obj[header] = values[i] || "";
                });
                return obj;
            });
        }

        function classifyVehicle(row) {
            const possibleKeys = Object.keys(row).filter(k => k.includes('ประเภท'));
            for (let key of possibleKeys) {
                const val = String(row[key]).toUpperCase().replace(/\s/g, '');
                if (val.includes('C1') || val.includes('4ล้อ')) return 'C1';
                if (val.includes('C2') || val.includes('6ล้อ')) return 'C2';
                if (val.includes('C3') || val.includes('มากกว่า6')) return 'C3';
            }
            return 'C4';
        }

       function getR05Summary() {
    if (!filesData.R05) return null;
    const data = filesData.R05.data;
    const stats = {
        grandTotal: 0,
        checked: { C1: 0, C2: 0, C3: 0, C4: 0, total: 0 },
        unchecked: { C1: 0, C2: 0, C3: 0, C4: 0, total: 0 },
        approvalSystem: { ALPR: { checked: 0, unchecked: 0 }, MLPR: { checked: 0, unchecked: 0 }, MANUAL: { checked: 0, unchecked: 0 } },
        // 🚩 ส่วนที่เพิ่มเข้ามาเพื่อให้ R09 มีข้อมูลด่าน/เลน
        main: {
            TC1: { l1: 0, l2: 0, l3: 0, l4: 0, total: 0 },
            TC2: { l1: 0, l2: 0, l3: 0, l4: 0, total: 0 },
            TY1: { l1: 0, l2: 0, l3: 0, l4: 0, total: 0 },
            TY2: { l1: 0, l2: 0, l3: 0, l4: 0, total: 0 }
        }
    };

    data.forEach(item => {
        const headers = Object.keys(item).filter(k => k !== '__rawValues');
        const statusR = String(item[headers.find(h => h.includes('(R)'))] || '').trim().toUpperCase();
        const systemType = String(item[headers.find(h => h.includes('ประเภทระบบ'))] || '').trim().toUpperCase();
        
        // 🚩 ดึงชื่อด่านและเลนจากข้อมูลดิบ
        const plazaName = String(item[headers.find(h => h.includes('ชื่อด่าน'))] || '').trim();
        const laneNo = String(item[headers.find(h => h.includes('เลน'))] || '').trim();

        const category = classifyVehicle(item);
        const isUnchecked = statusR.startsWith('R');
        const target = isUnchecked ? stats.unchecked : stats.checked;
        const sysKey = systemType.includes('ALPR') ? 'ALPR' : systemType.includes('MLPR') ? 'MLPR' : 'MANUAL';
        
        target[category]++;
        target.total++;
        stats.approvalSystem[sysKey][isUnchecked ? 'unchecked' : 'checked']++;

        // 🚩 Logic การนับยอดแยกด่าน/เลน สำหรับส่งให้ R09
        let plazaKey = '';
        if (plazaName.includes('ทับช้าง 1')) plazaKey = 'TC1';
        else if (plazaName.includes('ทับช้าง 2')) plazaKey = 'TC2';
        else if (plazaName.includes('ธัญบุรี 1')) plazaKey = 'TY1';
        else if (plazaName.includes('ธัญบุรี 2')) plazaKey = 'TY2';

        if (plazaKey && stats.main[plazaKey]) {
            const lKey = 'l' + laneNo; // จะได้ l1, l2, l3, l4
            if (stats.main[plazaKey][lKey] !== undefined) {
                stats.main[plazaKey][lKey]++;
                stats.main[plazaKey].total++;
            }
        }
    });

    stats.grandTotal = stats.checked.total + stats.unchecked.total;
    return stats;
}

        function getR06Summary() {
            if (!filesData.R06) return null;
            const data = filesData.R06.data;
            const initialRow = () => ({ items: 0, amount: 0, C1: 0, C2: 0, C3: 0, C4: 0, exItems: 0, exC1: 0, exC2: 0, exC3: 0, exC4: 0 });
            const stats = {
                grandTotal: 0, normalTotal: 0, exemptTotal: 0,
                main: { nonMember: initialRow(), memberGroup: initialRow(), memberThai: initialRow(), memberForeign: initialRow(), memberJuridical: initialRow(), total: initialRow() },
                sla: { total: 0, lessThan8: 0, moreThan8: 0, avgTime: 0 }
            };
            let totalSlaTimeSec = 0;
            data.forEach(item => {
                const headers = Object.keys(item).filter(k => k !== '__rawValues');
                const isExempt = String(item[headers.find(k => k.includes('รถยกเว้น'))] || '').trim() !== '-';
                const userType = String(item[headers.find(k => k.includes('ประเภทผู้ใช้บริการ'))] || '').trim();
                const fee = parseFloat(String(item[headers.find(k => k.includes('ค่าธรรมเนียม'))] || '0').replace(/[^0-9.]/g, '')) || 0;
                const sla = String(item[headers.find(k => k.includes('ผล SLA'))] || '').trim().toUpperCase();
                const timeStr = String(item[headers.find(k => k.includes('T2-T1'))] || '0:0');
                
                let mKey = userType.includes('ไทย') ? 'memberThai' : userType.includes('ต่างชาติ') ? 'memberForeign' : userType.includes('นิติบุคคล') ? 'memberJuridical' : 'nonMember';
                const cKey = classifyVehicle(item);

                if (!isExempt) {
                    stats.normalTotal++;
                    [mKey, 'total'].forEach(k => { stats.main[k].items++; stats.main[k].amount += fee; stats.main[k][cKey]++; });
                } else {
                    stats.exemptTotal++;
                    [mKey, 'total'].forEach(k => { stats.main[k].exItems++; stats.main[k][`ex${cKey}`]++; });
                }
                stats.grandTotal++;
                stats.sla.total++;
                if (sla === 'P') stats.sla.lessThan8++; else if (sla === 'F') stats.sla.moreThan8++;
                const t = timeStr.split(':');
                if (t.length === 2) totalSlaTimeSec += (parseInt(t[0]) * 60) + parseInt(t[1]);
            });
            ['memberThai', 'memberForeign', 'memberJuridical'].forEach(k => {
                Object.keys(stats.main[k]).forEach(prop => stats.main.memberGroup[prop] += stats.main[k][prop]);
            });
            if (stats.sla.total > 0) stats.sla.avgTime = (totalSlaTimeSec / 60) / stats.sla.total;
            return stats;
        }

function getR07Summary() {
    if (!filesData.R07) return null;
    const data = filesData.R07.data;
    const stats = { grandTotal: 0 };
    r07Keys.forEach(k => stats[k.id] = 0);

    data.forEach(item => {
        const headers = Object.keys(item).filter(k => k !== '__rawValues');
        const descKey = headers.find(h => h.includes('รายละเอียดรายการรถที่ไม่สามารถตรวจสอบได้'));
        const desc = String(item[descKey] || '').trim();

        if (desc) {
            stats.grandTotal++;
            
            // --- ปรับปรุง Logic การนับยอดแยก R1 และ R10 ---
            // ใช้ regex เพื่อดึงรหัส R ตัวแรกที่ตามด้วยตัวเลขออกมา (เช่น R1, R10)
            const rMatch = desc.match(/^R(\d+)/);
            if (rMatch) {
                const rCode = "R" + rMatch[1]; // จะได้ "R1", "R2", ..., "R10"
                
                if (rCode === 'R1') stats.R1++;
                else if (rCode === 'R10') stats.R10++; // แยกนับ R10 ออกมาต่างหาก
                else if (rCode === 'R2') stats.R2++;
                else if (rCode === 'R3') stats.R3++;
                else if (rCode === 'R4') stats.R4++;
                else if (rCode === 'R5') stats.R5++;
                else if (rCode === 'R6') {
                    if (desc.includes('ป้ายแดง')) stats.R6_RED++;
                    else if (desc.includes('เพื่อขาย')) stats.R6_SALE++;
                    else if (desc.includes('TC')) stats.R6_TC++;
                    else if (desc.includes('QC')) stats.R6_QC++;
                    else stats.R6_FORBID++;
                }
                else if (rCode === 'R7') stats.R7++;
                else if (rCode === 'R8') stats.R8++;
                else if (rCode === 'R9') stats.R9++;
            }
        }
    });
    return stats;
}

    }
}

// --- 1. ฟังก์ชันช่วยแยกก้อนข้อมูล R05 ---
        function getR05SplitData() {
            if (!filesData.R05) return { valid: [], invalid: [] };
            const data = filesData.R05.data;
            
            // ใช้แค่คำว่า 'ตรวจสอบได้ (R)' เพื่อลดปัญหาเรื่องการนับช่องว่าง "รถที่ไม่สามารถ..."
            const colR = Object.keys(data[0] || {}).find(k => k.includes('ตรวจสอบได้ (R)'));
            
            // เพิ่มการตรวจเช็ค: ถ้าหาไม่เจอจริงๆ ให้บอกว่าเจอคอลัมน์อะไรบ้าง
            if (!colR) {
                console.log("ชื่อคอลัมน์ที่มีในไฟล์:", Object.keys(data[0] || {}));
                alert("หาคอลัมน์สำหรับแยกประเภทรถไม่เจอครับ กรุณาตรวจสอบหัวตารางในไฟล์ R05");
                return { valid: [], invalid: [] };
            }

            const valid = data.filter(row => String(row[colR] || '').trim() === "-");
            const invalid = data.filter(row => String(row[colR] || '').trim() !== "-");
            return { valid, invalid };
        }

        // --- 2. ฟังก์ชันหลักสำหรับปุ่ม 1.1 - 1.4 (ชนด้วย Transaction No) ---
        function compareTransactions(dataA, dataB, labelA, labelB) {
            const getTransList = (data) => {
                const key = Object.keys(data[0] || {}).find(k => k.toLowerCase().includes('transaction'));
        	return data.map(row => String(row[key] || '').trim()).filter(v => v !== '');
            };
            const listA = getTransList(dataA);
            const listB = getTransList(dataB);
            const setA = new Set(listA);
            const setB = new Set(listB);
            return {
                aInB: listA.filter(id => setB.has(id)),
                aNotInB: listA.filter(id => !setB.has(id)),
                bInA: listB.filter(id => setA.has(id)),
                bNotInA: listB.filter(id => !setA.has(id)),
                countA: listA.length, countB: listB.length
            };
        }

        // --- 3. ฟังก์ชันสำหรับปุ่ม 1.5 (หารายการซ้ำ) ---
        function findR05Duplicates() {
    // 1. เช็คว่ามีข้อมูล R05 ไหม
    if (!filesData || !filesData.R05) {
        Swal.fire({ icon: 'warning', title: 'ไม่พบข้อมูล R05', text: 'กรุณาอัพโหลดไฟล์ก่อน' });
        return;
    }

    const data = filesData.R05.data;
    const map = new Map();
    const duplicates = [];

    // หัวข้อที่ใช้เช็คซ้ำตามที่คุณต้องการ
    const targetCols = [
        'ทะเบียนรถ', 
        'ทะเบียนจังหวัด', 
        'วันที่ขาเข้า', 
        'เวลาขาเข้า', 
        'ด่านขาเข้า'
    ];

    data.forEach((row, index) => {
        // สร้างประโยคสำหรับเช็คซ้ำ (รวม 5 คอลัมน์)
        const combinedKey = targetCols
            .map(col => String(row[col] || '').trim())
            .join(' '); // ใช้ช่องว่างคั่นตามที่คุณต้องการ
        
        // ดึง Transaction No. (ตรวจสอบชื่อคอลัมน์ให้ตรงกับ CSV)
        const transNo = row['Transaction No.'] || row['Transaction No'] || 'ไม่พบเลข';

	if (String(transNo).startsWith('TW')) {
            return; 
        }

        if (combinedKey.trim() !== "") {
            if (map.has(combinedKey)) {
                const firstMatch = map.get(combinedKey);
                
                // ถ้าซ้ำครั้งแรก เก็บตัวต้นฉบับก่อน
                if (!firstMatch.isAdded) {
                    duplicates.push({ 
                        line: firstMatch.line, 
                        transNo: firstMatch.transNo,
                        content: combinedKey 
                    });
                    firstMatch.isAdded = true;
                }
                
                // เก็บตัวที่ซ้ำปัจจุบัน
                duplicates.push({ 
                    line: index + 2, 
                    transNo: transNo,
                    content: combinedKey 
                });
            } else {
                // บันทึกตัวแรกที่เจอ
                map.set(combinedKey, { 
                    line: index + 2, 
                    transNo: transNo, 
                    isAdded: false 
                });
            }
        }
    });

    if (duplicates.length > 0) {
        let listHtml = `<div class="text-left space-y-3 max-h-[500px] overflow-y-auto p-2 font-sarabun">`;
        
        // ตัวแปรสำหรับสลับสีกลุ่ม
        let groupIndex = 0;
        
        duplicates.forEach((item, i) => {
            // เช็คว่าเป็นกลุ่มใหม่หรือไม่
            const isNewGroup = i > 0 && item.content !== duplicates[i-1].content;
            
            if (isNewGroup) groupIndex++;

            // กำหนดสีพื้นหลังสลับกันตามกลุ่ม
            const bgColors = ['bg-white', 'bg-blue-50', 'bg-emerald-50', 'bg-amber-50', 'bg-purple-50'];
            const bgColor = bgColors[groupIndex % bgColors.length];
            const borderColor = isNewGroup ? 'border-t-4 border-t-red-500 mt-6' : 'border-gray-200';

            // 🌟 ปรับปรุงส่วนนี้ให้คลิกได้ พร้อมเพิ่มคลาสสำหรับสั่งคัดลอก (copy-duplicate)
            listHtml += `
                <div class="p-4 border-x border-b rounded-xl ${bgColor} ${borderColor} shadow-sm transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <span class="bg-slate-700 text-white text-[10px] px-2 py-1 rounded font-bold">กลุ่มที่ ${groupIndex + 1}</span>
                            <span class="bg-red-500 text-white text-[10px] px-2 py-1 rounded font-bold">แถวที่ ${item.line}</span>
                        </div>
                        <span class="font-mono text-sm font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded">
                            ID: ${item.transNo}
                        </span>
                    </div>
                    <div class="copy-duplicate text-[12px] text-gray-600 font-medium p-2 bg-white/50 rounded border border-dashed border-gray-300 cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition relative group" data-content="${item.content}">
                        <span class="text-gray-400 text-[10px] block mb-1">ข้อมูลที่ซ้ำกัน: <span class="text-blue-500 font-normal hidden group-hover:inline ml-1 animate-pulse">(👆 คลิกเพื่อคัดลอกข้อความ)</span></span>
                        ${item.content}
                    </div>
                </div>`;
        });
        listHtml += `</div>`;

        Swal.fire({
            title: `<div class="flex items-center justify-center gap-2">
                        <span class="text-red-600 font-bold">พบรายการซ้ำทั้งหมด ${duplicates.length} รายการ</span>
                    </div>`,
            html: listHtml,
            width: '600px',
            confirmButtonText: 'รับทราบ',
            confirmButtonColor: '#1e293b',
            customClass: { popup: 'rounded-3xl' },
            // 🌟 เพิ่มสคริปต์ดักจับการคลิกเพื่อคัดลอกข้อความ
            didOpen: () => {
                const copyItems = document.querySelectorAll('.copy-duplicate');
                copyItems.forEach(item => {
                    item.addEventListener('click', () => {
                        const content = item.getAttribute('data-content');
                        navigator.clipboard.writeText(content).then(() => {
                            // เก็บเนื้อหา HTML เดิมไว้
                            const originalHTML = item.innerHTML;
                            
                            // เปลี่ยนแปลงหน้าจอชั่วคราวให้รู้ว่ากดคัดลอกแล้ว
                            item.innerHTML = `<div class="text-green-600 font-bold text-center py-2 flex justify-center items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> 
                                คัดลอกข้อมูลสำเร็จ!
                            </div>`;
                            item.classList.add('bg-green-50', 'border-green-300');
                            
                            // คืนค่าแสดงผลกลับเป็นเหมือนเดิมในเวลา 1.2 วินาที
                            setTimeout(() => {
                                item.innerHTML = originalHTML;
                                item.classList.remove('bg-green-50', 'border-green-300');
                            }, 1200);
                        }).catch(err => {
                            console.error('คัดลอกข้อมูลไม่สำเร็จ:', err);
                        });
                    });
                });
            }
        });
    } 
    else {
        Swal.fire({
            icon: 'success',
            title: 'ไม่พบรายการซ้ำ',
            timer: 2000,
            showConfirmButton: false,
            customClass: { popup: 'rounded-2xl' }
        });
    }

    return duplicates;
}

        // --- 4. ฟังก์ชันควบคุมปุ่มกด (ที่คุณหาไม่เจอ) ---
        // --- ส่วนควบคุมปุ่มกด Reconcile 1.1 - 1.5 ---
function runReconcile(type) {
    const { valid, invalid } = getR05SplitData();
    let result, title, labelA, labelB;

    // ตรวจเช็คความพร้อมของไฟล์
    const checkFiles = (requiredKeys, names) => {
        const missing = requiredKeys.filter(k => !filesData[k]);
        if (missing.length > 0) {
            Swal.fire({
                icon: 'warning',
                title: 'ข้อมูลไม่ครบ',
                text: `กรุณาอัปโหลดไฟล์: ${names.join(' และ ')} ก่อนทำการ Reconcile`,
                confirmButtonColor: '#a855f7'
            });
            return false;
        }
        return true;
    };

    if (type === '05vs06') {
        if (!checkFiles(['R05', 'R06'], ['R05', 'R06'])) return;
        result = compareTransactions(valid, filesData.R06.data, 'R05 ตรวจสอบได้', 'R06');
        title = "ผลการชนข้อมูล 1.1 (R05 ตรวจสอบได้ vs R06)"; 
        labelA = "R05 (-)"; labelB = "R06";
    } 
    else if (type === '05vs07') {
        if (!checkFiles(['R05', 'R07'], ['R05', 'R07'])) return;
        result = compareTransactions(invalid, filesData.R07.data, 'R05 ตรวจสอบไม่ได้', 'R07');
        title = "ผลการชนข้อมูล 1.2 (R05 ตรวจสอบไม่ได้ vs R07)"; 
        labelA = "R05 (R)"; labelB = "R07";
    } 
    else if (type === '05vs08') {
        if (!checkFiles(['R05', 'R08'], ['R05', 'R08'])) return;
        
        // 🌟 กรอง R05 เพิ่มเติม: เอาเฉพาะคอลัมน์ "รถยกเว้น" ที่มีค่าเป็น "รถยกเว้น"
        const exemptCol = Object.keys(valid[0] || {}).find(k => k.includes('รถยกเว้น'));
        const filteredR05 = exemptCol 
            ? valid.filter(row => String(row[exemptCol] || '').includes('รถยกเว้น'))
            : valid;

        result = compareTransactions(filteredR05, filesData.R08.data, 'R05 (เฉพาะรถยกเว้น)', 'R08');
        title = "ผลการชนข้อมูล 1.3 (R05 ตรวจสอบได้ [เฉพาะรถยกเว้น] vs R08)"; 
        labelA = "R05 (- และ รถยกเว้น)"; labelB = "R08";
    } 
    else if (type === '06vs08') {
        if (!checkFiles(['R06', 'R08'], ['R06', 'R08'])) return;

        // 🌟 กรอง R06: เอาเฉพาะคอลัมน์ "รถยกเว้น" ที่มีค่าเป็น "รถยกเว้น"
        const r06Data = filesData.R06.data;
        const exemptCol = Object.keys(r06Data[0] || {}).find(k => k.includes('รถยกเว้น'));
        const filteredR06 = exemptCol 
            ? r06Data.filter(row => String(row[exemptCol] || '').includes('รถยกเว้น'))
            : r06Data;

        result = compareTransactions(filteredR06, filesData.R08.data, 'R06 (เฉพาะรถยกเว้น)', 'R08');
        title = "ผลการชนข้อมูล 1.4 (R06 [เฉพาะรถยกเว้น] vs R08)"; 
        labelA = "R06 (รถยกเว้น)"; labelB = "R08";
    } 
    else if (type === 'dup') {
            if (!checkFiles(['R05'], ['R05'])) return;
            findR05Duplicates(); // เรียกฟังก์ชันเช็คซ้ำ 5 คอลัมน์
            return;
        }
        else if (type === '05vs13') {
            if (!checkFiles(['R05', 'R13'], ['R05', 'R13'])) return;

            const r05Data = filesData.R05.data;
            const r13Data = filesData.R13.data; // ดึงข้อมูล R13
            const colR = Object.keys(r05Data[0] || {}).find(k => k.includes('ตรวจสอบได้ (R)'));
            const txColR05 = Object.keys(r05Data[0] || {}).find(k => k.toLowerCase().includes('transaction'));

            // ค้นหาคอลัมน์ ทะเบียน และ จังหวัด ของ R05
            const plateColR05 = Object.keys(r05Data[0] || {}).find(k => k.includes('ทะเบียนรถ') || k === 'ทะเบียน');
            const provColR05 = Object.keys(r05Data[0] || {}).find(k => k.includes('จังหวัด'));

            // ค้นหาคอลัมน์ ทะเบียน และ จังหวัด ของ R13
            const txColR13 = Object.keys(r13Data[0] || {}).find(k => k.toLowerCase().includes('transaction'));
            const plateColR13 = Object.keys(r13Data[0] || {}).find(k => k.includes('ทะเบียนรถ') || k === 'ทะเบียน');
            const provColR13 = Object.keys(r13Data[0] || {}).find(k => k.includes('จังหวัด'));

            // 1. กรองเฉพาะข้อมูลที่ตรงตามเงื่อนไขเพื่อนำไปชนกับ R13
            const filteredR05 = r05Data.filter(row => {
                const val = String(row[colR] || '').trim();
                if (val === '-') return true;
                if (val.includes('R1')) return true;
                if (val.includes('R5')) return true;
                if (val.includes('R8')) return true;
                if (val.includes('R9')) return true;
                if (val.includes('R6') && (val.includes('เพื่อขาย') || val.includes('ป้ายแดง') || val.includes('TC') || val.includes('QC'))) return true;
                return false;
            });

            // 2. ดึง Transaction No ของ R5 พร้อมแนบ ทะเบียน+จังหวัด แบบมีลูกเล่น
            const r5Transactions = filteredR05
                .filter(row => String(row[colR] || '').includes('R5'))
                .map(row => {
                    const tx = String(row[txColR05] || '').trim();
                    const plate = String(row[plateColR05] || '').trim() || '-';
                    const prov = String(row[provColR05] || '').trim() || '-';
                    
                    // สร้าง HTML แบบสวยงาม เน้นตัวอักษร "ทะเบียน" และ "จังหวัด"
                    let detailHTML = `
                        <span class="text-slate-800">${tx}</span> 
                        <span class="ml-2 inline-flex items-center gap-1 bg-blue-100 px-2 py-0.5 rounded-md border border-blue-200">
                            <span class="text-[10px] font-black text-blue-800 uppercase tracking-wider">ทะเบียน</span>
                            <span class="font-bold text-blue-900 text-[13px]">${plate}</span>
                        </span>
                        <span class="ml-1 inline-flex items-center gap-1 bg-amber-100 px-2 py-0.5 rounded-md border border-amber-200">
                            <span class="text-[10px] font-black text-amber-800 uppercase tracking-wider">จังหวัด</span>
                            <span class="font-bold text-amber-900 text-[13px]">${prov}</span>
                        </span>
                    `;
                    return { tx: tx, displayHTML: detailHTML }; 
                })
                .filter(v => v.tx !== '');

            // 3. นำข้อมูลที่ผ่านการกรองแล้ว ไปชนกับ R13 ตามปกติ
            const resultR13 = compareTransactions(filteredR05, r13Data, 'R05 (กรองเงื่อนไข)', 'R13');

            // 🌟 ฟังก์ชันช่วยสร้าง HTML แบบป้ายทะเบียนอยู่ "ด้านล่าง" (บรรทัดใหม่)
            const createPlateProvHTML = (tx, plate, prov) => {
                const p = plate || '-';
                const v = prov || '-';
                // ถึงไม่มีทะเบียน/จังหวัด ก็ให้มีโครงสร้างเดิม เพื่อให้หน้าตากล่องเท่ากัน
                return `
                    <div class="flex flex-col w-full gap-1">
                        <div class="text-slate-800 font-black text-[13px] break-all">${tx}</div> 
                        <div class="flex flex-wrap items-center gap-2 mt-0.5">
                            <span class="inline-flex items-center gap-1 bg-blue-100 px-2 py-0.5 rounded-md border border-blue-200 shadow-sm">
                                <span class="text-[9px] font-black text-blue-800 uppercase tracking-wider">ทะเบียน</span>
                                <span class="font-bold text-blue-900 text-[12px]">${p}</span>
                            </span>
                            <span class="inline-flex items-center gap-1 bg-amber-100 px-2 py-0.5 rounded-md border border-amber-200 shadow-sm">
                                <span class="text-[9px] font-black text-amber-800 uppercase tracking-wider">จังหวัด</span>
                                <span class="font-bold text-amber-900 text-[12px]">${v}</span>
                            </span>
                        </div>
                    </div>
                `;
            };

            // อัปเดตการดึงข้อมูลรายชื่อที่ไม่พบ ให้มีป้ายทะเบียนติดไปด้วย (แบบ HTML)
            resultR13.aNotInB_Details = resultR13.aNotInB.map(tx => {
                const row = filteredR05.find(r => String(r[txColR05] || '').trim() === tx);
                const plate = row ? String(row[plateColR05] || '').trim() : '-';
                const prov = row ? String(row[provColR05] || '').trim() : '-';
                return createPlateProvHTML(tx, plate, prov);
            });

            resultR13.bNotInA_Details = resultR13.bNotInA.map(tx => {
                const row = r13Data.find(r => String(r[txColR13] || '').trim() === tx);
                const plate = row ? String(row[plateColR13] || '').trim() : '-';
                const prov = row ? String(row[provColR13] || '').trim() : '-';
                return createPlateProvHTML(tx, plate, prov);
            });

            // 4. เรียกใช้ Popup แบบใหม่
            showR05vsR13Popup("ผลการชนข้อมูล 1.6 (R05 ออกบิลได้ vs R13)", resultR13, r5Transactions);
            return; // ให้ออกจากฟังก์ชันตรงนี้เลย
        }
	else if (type === '11vs13') {
        if (!checkFiles(['R11', 'R13'], ['R11', 'R13'])) return;
        
        // ดึงข้อมูล Transaction จาก R11 และ R13
        const r11Data = filesData.R11.data;
        const r13Data = filesData.R13.data;

        result = compareTransactions(r11Data, r13Data, 'R11', 'R13');
        title = "ผลการชนข้อมูล 1.7 (R11 vs R13)"; 
        labelA = "R11 (Transaction No.)"; 
        labelB = "R13 (Transaction)";
    }
    // 🌟 โค้ดที่แก้ไขใหม่ (ดึงข้อมูลแถวดิบๆ ทะลวงบั๊กการอ่าน Header ของ CSV 100%) 🌟
    else if (type === 'sla100') {
        if (!checkFiles(['R06'], ['R06'])) return;

        const r06Data = filesData.R06.data;
        const over100List = [];

        r06Data.forEach((row) => {
            // 1. ดึงข้อมูลดิบของแถวนั้นๆ ออกมาเลย (ไม่สน Header ที่ระบบดึงมาพัง)
            const vals = row['__rawValues'] || [];
            
            // 2. ข้ามบรรทัดที่เป็น Header ที่พัง (ถ้าข้อมูลแถวปกติจริงๆ ต้องมีอย่างน้อย 20 ช่อง)
            if (vals.length < 20) return;
            
            // 3. ดึงค่าตามลำดับช่องเป๊ะๆ (นับช่องแรกเป็น 0)
            const txRaw = vals[1] || '-';      // ช่อง Transaction
            const sysRaw = vals[4] || '-';     // ช่อง ประเภทระบบ
            const plateRaw = vals[5] || '-';   // ช่อง ทะเบียนรถ
            const provRaw = vals[6] || '-';    // ช่อง จังหวัด
            const slaRaw = vals[17] || '0';    // ช่อง T2-T1 (เวลา)
            const checkRaw = vals[19] || '-';  // ช่อง ประเภทการตรวจสอบ

            // 4. แปลงค่าเวลาเป็นตัวเลขทศนิยม
            const slaVal = parseFloat(String(slaRaw).replace(/[^0-9.-]+/g, "")) || 0;
            
            // 5. กรองเอาเฉพาะที่เกิน หรือเท่ากับ 100 นาที
            if (slaVal >= 100) {
                const tx = String(txRaw).trim();
                const sys = String(sysRaw).trim();
                const plate = String(plateRaw).trim();

        function getValidationClass(field, manualVal, autoData) {
    // 1. ถ้ายังไม่กรอกข้อมูล (ค่าว่าง) ให้เป็นสีพื้นปกติ
    if (manualVal === undefined || manualVal === null || manualVal === '') {
        return 'bg-white'; 
    }

    // 2. ลบลูกน้ำและช่องว่างออกจากค่าที่กรอก
    const cleanManualVal = String(manualVal).replace(/[,\s]/g, '');
    const v1 = Number(cleanManualVal);

    let compareVal = 0;

    // 3. ตรวจสอบชนิดข้อมูลที่ส่งมาจากระบบ (autoData)
    if (typeof autoData === 'number' || typeof autoData === 'string') {
        compareVal = Number(String(autoData).replace(/[,\s]/g, ''));
    } 
    else if (autoData && typeof autoData === 'object') {
        let current = autoData;
        const keys = field.split('.');
        
        for (let k of keys) {
            if (current && current[k] !== undefined) {
                current = current[k];
            } else {
                current = 0;
                break;
            }
        }
        compareVal = Number(current);
    }

    // 4. ปัดเศษทศนิยมให้เป็น 2 ตำแหน่งทั้งคู่ก่อนนำมาเปรียบเทียบ (แก้ปัญหาช่อง SLA)
    // การใช้ .toFixed(2) จะทำให้ทศนิยมยาวๆ ถูกปัดเศษให้เหลือ 2 หลักเท่ากัน
    const v1Fixed = Number(v1.toFixed(2));
    const compareValFixed = Number(compareVal.toFixed(2));

    // 5. เทียบค่าและคืนค่าสี
    if (v1Fixed === compareValFixed) {
        return 'bg-emerald-100 text-emerald-700 font-bold'; // ตรงกัน = เขียว
    } else {
        return 'bg-red-100 text-red-700 animate-pulse font-bold'; // ไม่ตรง = แดง
    }
}

function getR11Summary() {
    if (!filesData.R11) return null;
    
    const data = filesData.R11.data;

    const initZeroSubRow = () => ({
        member: { thai: { C1:0, C2:0, C3:0, C4:0 }, foreign: { C1:0, C2:0, C3:0, C4:0 }, juridical: { C1:0, C2:0, C3:0, C4:0 }, totalTxn: 0, totalAmount: 0 },
        nonMember: { vehicle: { C1:0, C2:0, C3:0, C4:0 }, totalTxn: 0, totalAmount: 0 },
        grandTotalTxn: 0, grandTotalAmount: 0
    });
    const initZeroSummaryRow = () => ({ txn: 0, inv: 0, toll: 0, fee2: 0, fee10: 0, fee200: 0, totalAmount: 0 });

    let stats = { summary: { member: initZeroSummaryRow(), nonMember: initZeroSummaryRow(), total: initZeroSummaryRow() } };
    
    r11Config.forEach(t => {
        stats[t.id] = {};
        t.channels.forEach(c => { stats[t.id][c] = initZeroSubRow(); });
    });

    const memberInvoices = new Set();
    const nonMemberInvoices = new Set();

    const statusMap = {
        'ชำระเงินสำเร็จ': 'success',
        'ชำระเงินไม่สำเร็จ': 'fail',
        'รอดำเนินการชำระ': 'pending',
        'ระหว่างดำเนินการชำระ': 'processing'
    };

    data.forEach(row => {
        const headers = Object.keys(row).filter(k => k !== '__rawValues');
        
        const colMemberType = headers.find(h => h.includes('ประเภทสมาชิก'));
        const colInvoice = headers.find(h => h.includes('เลขที่ใบแจ้งหนี้'));
        const colToll = headers.find(h => h.includes('ค่าผ่านทาง')); 
        const colFee2 = headers.find(h => h.includes('ค่าเสียหาย 2 เท่า'));
        const colFee10 = headers.find(h => h.includes('ค่าปรับ 10 เท่า'));
        const colFee200 = headers.find(h => h.includes('ค่าปรับ 200 บาท'));
        
        const colPayStatus = headers.find(h => h.includes('สถานะ การชำระ'));
        const colUserType = headers.find(h => h.includes('ประเภทผู้ใช้บริการ'));
        const colVehicleType = headers.find(h => h === 'ประเภทรถ' || h.includes('ประเภทรถ'));
        const colPayChannel = headers.find(h => (h.includes('ช่องทางการชำระเงิน') || h.includes('ช่องทาง ชำระเงิน')) && !h.includes('อ้างอิง'));
        
        // 🌟 ดึงคอลัมน์ "ยอดรวม (บาท)" มาใช้เป็นหลักสำหรับคำนวณเงินในตาราง 2-5 🌟
        const colTotalBill = headers.find(h => h === 'ยอดรวม (บาท)' || (h.includes('ยอดรวม') && !h.includes('ชำระ')));

        if (!colMemberType) return;

        const memberType = String(row[colMemberType] || '').trim();
        const invoiceNo = String(row[colInvoice] || '').trim();
        const parseAmt = (val) => parseFloat(String(val).replace(/[^0-9.-]+/g, "")) || 0;

        // [ตารางที่ 1] Summary
        const toll = parseAmt(row[colToll]);
        const fee2 = parseAmt(row[colFee2]);
        const fee10 = parseAmt(row[colFee10]);
        const fee200 = parseAmt(row[colFee200]);

        if (memberType === 'สมาชิก') {
            stats.summary.member.txn += 1;
            if (invoiceNo && invoiceNo !== '-' && invoiceNo.toLowerCase() !== 'null') memberInvoices.add(invoiceNo);
            stats.summary.member.toll += toll; stats.summary.member.fee2 += fee2; stats.summary.member.fee10 += fee10; stats.summary.member.fee200 += fee200;
        } else if (memberType === 'ไม่ใช่สมาชิก') {
            stats.summary.nonMember.txn += 1;
            if (invoiceNo && invoiceNo !== '-' && invoiceNo.toLowerCase() !== 'null') nonMemberInvoices.add(invoiceNo);
            stats.summary.nonMember.toll += toll; stats.summary.nonMember.fee2 += fee2; stats.summary.nonMember.fee10 += fee10; stats.summary.nonMember.fee200 += fee200;
        }

        // [ตารางที่ 2-5]
        const payStatus = String(row[colPayStatus] || '').trim();
        const tableId = statusMap[payStatus];
        
        if (tableId) {
            const userType = String(row[colUserType] || '').trim();
            const vehicleType = String(row[colVehicleType] || '').trim().toUpperCase();
            const payChannel = String(row[colPayChannel] || '').trim();

            // 🌟 นำค่าจากคอลัมน์ "ยอดรวม (บาท)" มาเก็บใส่ตัวแปร money ทันที
            const money = parseAmt(row[colTotalBill]);

            const getChannelKey = (raw) => {
                const s = raw.toLowerCase().replace(/\s|-/g, ''); 
                if (s.includes('counterservice')) return 'CounterService';
                if (s.includes('exception')) return 'EXCEPTION'; // เพิ่มใหม่
                if (s.includes('mobilebanking')) return 'MobileBanking';
                if (s.includes('pointpro')) return 'POINTPRO'; // เพิ่มใหม่
                if (s.includes('easypass')) return 'EasyPass';
                if (s.includes('mpass')) return 'MPASS';
                if (s.includes('ออมทรัพย์') || s.includes('saving')) return 'Saving';
                if (s.includes('เครดิต') || s.includes('เดบิต') || s.includes('credit')) return 'Credit';
                if (s.includes('ยังไม่ระบุ') || s.includes('unspecified')) return 'Unspecified';
                if (s.includes('dispute')) return 'Dispute';
                return null;
            };

            const matchedChannel = getChannelKey(payChannel);
            const currentConfig = r11Config.find(c => c.id === tableId);

            if (matchedChannel && currentConfig && currentConfig.channels.includes(matchedChannel)) {
                const targetRow = stats[tableId][matchedChannel];
                const isValidC = ['C1', 'C2', 'C3', 'C4'].includes(vehicleType);

                if (memberType === 'สมาชิก') {
                    let subCat = 'thai';
                    if (userType.includes('นิติบุคคล')) subCat = 'juridical';
                    else if (userType.includes('ต่างชาติ') || userType.toLowerCase().includes('foreign')) subCat = 'foreign';
                    
                    if (isValidC) targetRow.member[subCat][vehicleType] += 1;
                    targetRow.member.totalTxn += 1;
                    targetRow.member.totalAmount += money; // บันทึกยอดเงินรวม
                } else if (memberType === 'ไม่ใช่สมาชิก') {
                    if (isValidC) targetRow.nonMember.vehicle[vehicleType] += 1;
                    
                    targetRow.nonMember.totalTxn += 1;
                    targetRow.nonMember.totalAmount += money; // บันทึกยอดเงินรวม
                }
                
                targetRow.grandTotalTxn += 1;
                targetRow.grandTotalAmount += money; // บันทึกยอดเงินรวมทั้งหมด
            }
        }
    });

    // คำนวณยอดรวมแนวตั้ง
    r11Config.forEach(t => {
        const totalRow = stats[t.id]['total'];
        if (!totalRow) return;
        t.channels.forEach(ch => {
            if (ch === 'total') return;
            const row = stats[t.id][ch];
            ['thai', 'foreign', 'juridical'].forEach(sub => {
                ['C1', 'C2', 'C3', 'C4'].forEach(c => { totalRow.member[sub][c] += row.member[sub][c]; });
            });
            totalRow.member.totalTxn += row.member.totalTxn;
            totalRow.member.totalAmount += row.member.totalAmount;
            
            ['C1', 'C2', 'C3', 'C4'].forEach(c => { totalRow.nonMember.vehicle[c] += row.nonMember.vehicle[c]; });
            totalRow.nonMember.totalTxn += row.nonMember.totalTxn;
            totalRow.nonMember.totalAmount += row.nonMember.totalAmount;
            
            totalRow.grandTotalTxn += row.grandTotalTxn;
            totalRow.grandTotalAmount += row.grandTotalAmount;
        });
    });

    // สรุปยอดตารางที่ 1
    stats.summary.member.inv = memberInvoices.size;
    stats.summary.nonMember.inv = nonMemberInvoices.size;
    stats.summary.member.totalAmount = stats.summary.member.toll + stats.summary.member.fee2 + stats.summary.member.fee10 + stats.summary.member.fee200;
    stats.summary.nonMember.totalAmount = stats.summary.nonMember.toll + stats.summary.nonMember.fee2 + stats.summary.nonMember.fee10 + stats.summary.nonMember.fee200;
    
    const s = stats.summary;
    s.total.txn = s.member.txn + s.nonMember.txn;
    s.total.inv = s.member.inv + s.nonMember.inv;
    s.total.toll = s.member.toll + s.nonMember.toll;
    s.total.fee2 = s.member.fee2 + s.nonMember.fee2;
    s.total.fee10 = s.member.fee10 + s.nonMember.fee10;
    s.total.fee200 = s.member.fee200 + s.nonMember.fee200;
    s.total.totalAmount = s.member.totalAmount + s.nonMember.totalAmount;

    return stats;
}

// 🌟 วางตรงนี้ครับ: อัปเดตชื่อแถวให้รองรับ M-PASS 🌟

// --- ฟังก์ชันดึงข้อมูล R13 ---
function getR13Summary() {
    if (!filesData.R13) return null;
    
    const data = filesData.R13.data;

    const initRow = () => ({
        manual: { items: 0, amount: 0 },
        auto_trip: { items: 0, credit: 0, saving: 0, mpass: 0, easypass: 0 },
        auto_bill: { items: 0, credit: 0, saving: 0 }
    });

    const stats = {
        grandTotalItems: 0, 
        grandTotalAmount: 0,
        rows: {
            memberTotal: initRow(), 
            memberThai: initRow(),
            memberForeign: initRow(), 
            memberJuridical: initRow(),
            nonMember: initRow(), 
            total: initRow()
        },
        sla1: { total: 0, pass: 0, fail: 0, avg: 0, note: '' },
        sla2: { total: 0, pass: 0, fail: 0, note: '' },
        sla3: { total: 0, pass: 0, note: '' }
    };

    // ⚡ ฟังก์ชันตัวช่วย: จัดการเงื่อนไขแนวนอนตามกฎข้อ 1.1 - 1.6
    const updateRowLogic = (targetRow, form, type, channel, fee) => {
        // 1.1 และ 1.4: รายครั้งชำระเอง
        if (form === 'รายครั้ง' && type === 'ชำระเอง') {
            targetRow.manual.items++;
            targetRow.manual.amount += fee;
        } 
        // 1.2 และ 1.5: รายครั้งอัตโนมัติ
        else if (form === 'รายครั้ง' && type === 'อัตโนมัติ') {
            targetRow.auto_trip.items++;
            if (channel === 'บัตรเครดิต/เดบิต') { targetRow.auto_trip.credit += fee; }
            else if (channel === 'บัญชีออมทรัพย์') { targetRow.auto_trip.saving += fee; }
            else if (channel === 'บัญชีบัตร M-PASS') { targetRow.auto_trip.mpass += fee; }
            else if (channel === 'บัญชีบัตร Easy Pass') { targetRow.auto_trip.easypass += fee; }
        }
        // 1.3 และ 1.6: รอบบิลอัตโนมัติ
        else if (form === 'รายรอบบิล' && type === 'อัตโนมัติ') {
            targetRow.auto_bill.items++;
            if (channel === 'บัตรเครดิต/เดบิต') { targetRow.auto_bill.credit += fee; }
            else if (channel === 'บัญชีออมทรัพย์') { targetRow.auto_bill.saving += fee; }
        }
    };

    // ลูปอ่านข้อมูลจากไฟล์ CSV ทีละบรรทัด
    data.forEach(row => {
        const headers = Object.keys(row).filter(k => k !== '__rawValues');
        
        // ค้นหาหัวคอลัมน์
        const colMemberType = headers.find(h => h.includes('ประเภทสมาชิก'));
        const colUserType = headers.find(h => h.includes('ประเภทผู้ใช้บริการ'));
        const colForm = headers.find(h => h.includes('รูปแบบ(วิธีผูกการชำระเงิน)'));
        const colType = headers.find(h => h.includes('ประเภท(วิธีผูกการชำระเงิน)'));
        const colChannel = headers.find(h => h.includes('ช่องทาง(วิธีผูกการชำระเงิน)'));
        const colFee = headers.find(h => h.includes('ค่าธรรมเนียม'));

        if (!colMemberType || !colFee) return;

        // ดึงข้อมูล
        const memberType = String(row[colMemberType] || '').trim();
        const userType = String(row[colUserType] || '').trim();
        const form = String(row[colForm] || '').trim();
        const type = String(row[colType] || '').trim();
        const channel = String(row[colChannel] || '').trim();
        
        const feeStr = String(row[colFee] || '0').replace(/[^0-9.-]+/g, "");
        const fee = parseFloat(feeStr) || 0;

        // ⚡ เช็คเงื่อนไขแนวตั้งเพื่อส่งไปบวกยอด
        if (memberType === 'สมาชิก') {
            // อัปเดตแถว สมาชิก (ยอดรวมใหญ่)
            updateRowLogic(stats.rows.memberTotal, form, type, channel, fee);
            
            // แยกยอดลงตามประเภทผู้ใช้บริการ (บุคคลไทย, ต่างชาติ, นิติบุคคล)
            if (userType === 'บุคคลไทย') {
                updateRowLogic(stats.rows.memberThai, form, type, channel, fee);
            } else if (userType === 'บุคคลต่างชาติ') {
                updateRowLogic(stats.rows.memberForeign, form, type, channel, fee);
            } else if (userType === 'นิติบุคคล') {
                updateRowLogic(stats.rows.memberJuridical, form, type, channel, fee);
            }
        } 
        else if (memberType === 'ไม่ใช่สมาชิก') {
            // อัปเดตแถว ไม่ใช่สมาชิก
            updateRowLogic(stats.rows.nonMember, form, type, channel, fee);
        }
    });

    // ⚡ ส่วนที่ 2: รวมยอดในแถว "ยอดรวม" ล่างสุด
    // นำแนวตั้งของ ไทย, ต่างชาติ, นิติบุคคล, ไม่ใช่สมาชิก มาบวกเข้าด้วยกัน
    const targetGroups = ['memberThai', 'memberForeign', 'memberJuridical', 'nonMember'];
    
    targetGroups.forEach(key => {
        const r = stats.rows[key];
        const t = stats.rows.total;
        
        // รวมยอดรายครั้งชำระเอง
        t.manual.items += r.manual.items;
        t.manual.amount += r.manual.amount;
        
        // รวมยอดรายครั้งอัตโนมัติ
        t.auto_trip.items += r.auto_trip.items;
        t.auto_trip.credit += r.auto_trip.credit;
        t.auto_trip.saving += r.auto_trip.saving;
        t.auto_trip.mpass += r.auto_trip.mpass;
        t.auto_trip.easypass += r.auto_trip.easypass;
        
        // รวมยอดรอบบิลอัตโนมัติ
        t.auto_bill.items += r.auto_bill.items;
        t.auto_bill.credit += r.auto_bill.credit;
        t.auto_bill.saving += r.auto_bill.saving;
    });

    // คำนวณ Grand Total ด้านบนสุดตาราง (รายการทั้งหมด, จำนวนเงินทั้งหมด) 
    // โดยอิงจากแถว "ยอดรวม" (Total) เพื่อให้ตัวเลขเป๊ะและสมดุลที่สุด
    const totalRow = stats.rows.total;
    stats.grandTotalItems = totalRow.manual.items + totalRow.auto_trip.items + totalRow.auto_bill.items;
    stats.grandTotalAmount = totalRow.manual.amount + 
                             totalRow.auto_trip.credit + totalRow.auto_trip.saving + totalRow.auto_trip.mpass + totalRow.auto_trip.easypass + 
                             totalRow.auto_bill.credit + totalRow.auto_bill.saving;

    return stats;
}

        // --- Data Update with Clean Spaces Rule ---
        function updateVal(type, path, val) {
    // 1. ลบลูกน้ำและช่องว่างออก
    const cleanVal = val.replace(/[,\s]/g, '');
    
    let target;
    if (type === 'r05') target = manualData;
    else if (type === 'r06') target = manualR06Data;
    else if (type === 'r07') target = manualR07Data;
    else if (type === 'r08') target = manualR08Data;
    else if (type === 'r09') target = manualR09Data; // บันทึกเข้าตัวแปร R09
    else if (type === 'r11') target = manualR11Data; 
    else if (type === 'r13') target = manualR13Data; 

    if (!target) return; 

    // 2. เจาะเข้าไปบันทึกค่าตาม path
    const keys = path.split('.');
    for (let i = 0; i < keys.length - 1; i++) {
        target = target[keys[i]];
    }
    target[keys[keys.length - 1]] = cleanVal;

    // 🚩 ส่วนที่แก้ไข: ลบการสั่ง renderR09 ออกจากตรงนี้
    // ระบบจะแค่บันทึกค่าลงตัวแปร manualR09Data เงียบๆ 
    // และจะรอจนกว่าคุณจะกดปุ่ม "ประมวลผล R09" ถึงจะเกิดการวาดตารางใหม่
    
    console.log(`Updated ${type} [${path}]: ${cleanVal}`); 
}

        // --- Smart Paste Event Listener ---
        // รองรับการวางข้อมูล (Paste) ข้ามช่องที่ว่างเปล่า และลบการเว้นวรรค
        document.addEventListener('paste', function(e) {
            const target = e.target;
            if (target.tagName.toLowerCase() !== 'input' || target.type !== 'text') return;

            e.preventDefault();

            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const rows = pastedText.split(/\r?\n/);
            const flatValues = [];
            
            rows.forEach(row => {
                const cells = row.split('\t');
                cells.forEach(cell => {
                    // ลบช่องว่างออกทั้งหมดสำหรับทุกๆ ค่าที่ถูกก็อปมา
                    const cleanCell = cell.replace(/\s+/g, '');
                    // เก็บเฉพาะค่าที่ไม่ใช่ความว่างเปล่า เพื่อไม่ให้ไปดันข้อมูลช่องอื่น
                    if (cleanCell !== '') {
                        flatValues.push(cleanCell);
                    }
                });
            });

            if (flatValues.length === 0) return;

            // ดึง Input ทั้งหมดในตารางที่แสดงผลอยู่
            const allInputs = Array.from(document.querySelectorAll('#view-pivot input[type="text"]'));
            const startIndex = allInputs.indexOf(target);

            if (startIndex === -1) return;

            let inputIndex = startIndex;
            for (let i = 0; i < flatValues.length; i++) {
                if (inputIndex >= allInputs.length) break;

                const val = flatValues[i];
                const inputElement = allInputs[inputIndex];
                inputElement.value = val;
                // สร้าง Event เพื่ออัปเดตค่าไปยังตัวแปร ManualData อัตโนมัติ
                inputElement.dispatchEvent(new Event('change', { bubbles: true }));
                
                inputIndex++;
            }
        });

        // ... (โค้ดส่วน window.onload เดิม) ...
        window.onload = () => { renderUploadCards(); };

    return dateStr;
}

// --- ส่วนที่ 2: ฟังก์ชันหลักสำหรับการชนข้อมูล ---
function reconcileR05vsTcvs() {
    if (!filesData['R05'] || !filesData['Tcvs'] || !filesData['TankReport']) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณาอัปโหลด R05, Tcvs และ รวมถังให้ครบก่อน', 'warning');
        return;
    }

    drillDownData = { r05: {}, tcvs: {} };
    const r05Raw = filesData['R05'].data;
    const tcvsRaw = filesData['Tcvs'].data;
    const tankRaw = filesData['TankReport'].data;

    const totalR05 = r05Raw.length;
    const totalTcvs = tcvsRaw.length;
    const diffTotal = Math.abs(totalR05 - totalTcvs);

    const r05CleanSet = new Set(r05Raw.map(r => {
        const val = String(r['Transaction No.'] || "").trim();
        return val.substring(0, 30).slice(-8);
    }));

    const tankStatusMap = new Map();
    tankRaw.forEach(row => {
        const dt = String(row['ช่วงเวลาผ่านทาง'] || "").trim();
        const status = String(row['สถานะ'] || "").trim();
        if (dt && status !== "ใช้งาน" && !tankStatusMap.has(dt)) {
            tankStatusMap.set(dt, status);
        }
    });

    let r05Found = 0, r05NotFound = 0;
    const tcvsSet = new Set(tcvsRaw.map(r => String(r['Transaction No.'] || "").trim()));

    r05Raw.forEach(row => {
        const fullTx = String(row['Transaction No.'] || "").trim();
        const clean8 = fullTx.substring(0, 30).slice(-8);
        if (tcvsSet.has(clean8)) {
            r05Found++;
        } else {
            r05NotFound++;
            let key = fullTx;
            if (fullTx.startsWith('MT')) key = fullTx.substring(0, 3);
            else if (fullTx.startsWith('TW')) key = fullTx.substring(0, 2);
            if (!drillDownData.r05[key]) drillDownData.r05[key] = [];
            drillDownData.r05[key].push(fullTx);
        }
    });

    let tcvsFound = 0, tcvsNotFound = 0;
    tcvsRaw.forEach(row => {
        const tcvsTx = String(row['Transaction No.'] || "").trim();
        if (r05CleanSet.has(tcvsTx)) {
            tcvsFound++;
        } else {
            tcvsNotFound++;
            const dateParts = String(row['Date'] || "").split(/[-/]/);
            const formattedDate = dateParts.length === 3 && dateParts[0].length === 4 ? `${dateParts[2].padStart(2,'0')}/${dateParts[1].padStart(2,'0')}/${dateParts[0]}` : row['Date'];
            const searchDT = `${formattedDate} ${String(row['Time'] || "").trim()}`;
            const status = tankStatusMap.get(searchDT) || "ไม่พบสถานะ";
            if (!drillDownData.tcvs[status]) drillDownData.tcvs[status] = [];
            drillDownData.tcvs[status].push({ tx: tcvsTx, dt: searchDT });
        }
    });

    // เก็บผลลัพธ์ลงตัวแปร Global
    lastReconcileResult = {
        totalR05, totalTcvs, diffTotal,
        r05Found, r05NotFound,
        tcvsFound, tcvsNotFound,
        diffNotFound: Math.abs(r05NotFound - tcvsNotFound)
    };

    renderFinalPopup(lastReconcileResult);
}

// --- ส่วนที่ 4: ฟังก์ชันแสดงป๊อปอัพรายละเอียดชั้นที่ 2 ---
function showDrillDown(category, type) {
    const list = drillDownData[type][category];
    let contentHtml = '';

    if (type === 'r05') {
        contentHtml = `
            <div class="grid grid-cols-2 gap-2 text-sm">
                ${list.map(tx => `<div class="bg-indigo-50 p-2 rounded-lg border border-indigo-100 font-mono text-center font-bold text-indigo-700">${tx}</div>`).join('')}
            </div>
        `;
    } else {
        contentHtml = `
            <div class="overflow-hidden rounded-2xl border border-slate-200">
                <table class="w-full text-xs text-left">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="p-3">Transaction No.</th>
                            <th class="p-3">ช่วงเวลาผ่านทาง</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${list.map(item => `
                            <tr>
                                <td class="p-3 font-mono font-bold text-slate-700">${item.tx}</td>
                                <td class="p-3 text-slate-500 font-medium">${item.dt}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    Swal.fire({
        title: `<div class="text-xl font-black text-slate-800">กลุ่มข้อมูล: ${category}</div>`,
        width: '700px',
        html: `<div class="mt-4 max-h-[500px] overflow-y-auto custom-scrollbar p-2">${contentHtml}</div>`,
        showCancelButton: true,
        confirmButtonText: 'กลับหน้าสรุป',
        cancelButtonText: 'ปิดทั้งหมด',
        confirmButtonColor: '#4f46e5',
        cancelButtonColor: '#64748b',
        reverseButtons: true
    }).then((result) => {
        // 🚩 เมื่อกด "กลับหน้าสรุป" (Confirm Button) ให้เรียก renderFinalPopup กลับมา
        if (result.isConfirmed) {
            renderFinalPopup(lastReconcileResult);
        }
    });
}
